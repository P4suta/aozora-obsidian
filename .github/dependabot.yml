version: 2
updates:
  # GitHub Actions — keep SHA pins / version tags fresh weekly.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10
    groups:
      actions-sha-bumps:
        patterns: ["*"]

  # npm (bun-managed package.json). Group minor + patch bumps so
  # routine drift lands as a single PR; major bumps come through
  # individually for manual review.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10
    groups:
      npm-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Dockerfile FROM pins — Rust toolchain image, oven/bun image,
  # binaryen apt package version (via bookworm). Weekly so security
  # patches surface promptly.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    groups:
      docker-base-images:
        patterns: ["*"]

  # devcontainers/features pinned in .devcontainer/devcontainer.json.
  - package-ecosystem: devcontainers
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
