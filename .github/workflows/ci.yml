# CI for aozora-obsidian.
#
# Runs on every push and PR to main. Pure-JS plugin: no Rust / WASM
# build happens here — the `aozora.wasm` artefact is produced upstream
# in the `aozora` repo's release pipeline and copied into a release
# tag of THIS repo. The PoC build deliberately tolerates a missing
# `aozora.wasm` (warns rather than fails); release-grade builds set
# AOZORA_WASM_REQUIRED=1 to flip the gate to hard-fail.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: typescript (biome + tsc + esbuild + manifest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install
        run: bun install --frozen-lockfile

      - name: Biome (lint + format check)
        run: bun run lint

      - name: tsc --noEmit
        run: bun run typecheck

      - name: esbuild (production)
        run: node esbuild.config.mjs production

      - name: WASM artefact gate (PoC: warn-only)
        # PoC stage: aozora.wasm is not yet produced upstream, so the
        # script warns rather than fails. Release builds will set
        # AOZORA_WASM_REQUIRED=1 to flip this to a hard gate.
        run: node scripts/check-wasm.mjs

      - name: manifest.json schema check
        # Hand-rolled validator (Obsidian doesn't publish a JSON
        # Schema for plugin manifests — see scripts/validate-manifest.mjs
        # for the field list and its source).
        run: bun run validate-manifest

      - name: Bundle size report
        # Informational only — the lefthook pre-push hook enforces a
        # 2 MiB hard ceiling locally. CI just surfaces the number for
        # the PR reviewer.
        run: |
          if [ -f main.js ]; then
            BYTES=$(stat -c %s main.js)
            echo "main.js bundle size: ${BYTES} bytes"
          fi

  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1
