name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Default-deny — every job inherits read-only access to repo
# contents and nothing else. The build job only reads source +
# uploads an artefact via actions/upload-artifact; the typos job
# only reads source. Any future job that needs more (e.g. write
# packages, comment on PRs) overrides this at the job level.
permissions:
  contents: read

jobs:
  ci:
    name: lint + typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aozora-obsidian
        uses: actions/checkout@v6
        with:
          path: aozora-obsidian

      - name: Checkout sibling aozora crate
        uses: actions/checkout@v6
        with:
          repository: P4suta/aozora
          path: aozora

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install just on the runner
        run: |
          curl -fsSL https://just.systems/install.sh \
            | sudo bash -s -- --to /usr/local/bin --tag 1.36.0

      - name: Run full CI pipeline (check + wasm + test + build)
        working-directory: aozora-obsidian
        run: just ci

      - name: Upload built plugin artefacts
        uses: actions/upload-artifact@v7
        with:
          name: aozora-obsidian-plugin
          path: |
            aozora-obsidian/main.js
            aozora-obsidian/manifest.json
            aozora-obsidian/styles.css
            aozora-obsidian/aozora.wasm
          if-no-files-found: error
          retention-days: 14

  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1
