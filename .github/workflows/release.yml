name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: build + publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aozora-obsidian
        uses: actions/checkout@v6
        with:
          path: aozora-obsidian

      - name: Checkout sibling aozora crate
        uses: actions/checkout@v6
        with:
          repository: P4suta/aozora
          path: aozora

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install just on the runner
        run: |
          curl -fsSL https://just.systems/install.sh \
            | sudo bash -s -- --to /usr/local/bin --tag 1.36.0

      - name: Build production plugin (wasm + esbuild + check-wasm)
        working-directory: aozora-obsidian
        run: just build

      - name: Verify release assets exist
        working-directory: aozora-obsidian
        run: |
          for f in main.js manifest.json styles.css aozora.wasm; do
            test -f "$f" || { echo "missing: $f" >&2; exit 1; }
          done

      - name: Create release zip
        working-directory: aozora-obsidian
        run: |
          zip -j aozora-obsidian-${GITHUB_REF_NAME}.zip \
            main.js manifest.json styles.css aozora.wasm

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            aozora-obsidian/main.js
            aozora-obsidian/manifest.json
            aozora-obsidian/styles.css
            aozora-obsidian/aozora.wasm
            aozora-obsidian/aozora-obsidian-${{ github.ref_name }}.zip
